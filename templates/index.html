<!DOCTYPE html>
<html>
<head>

<title>Forest Fire Prediction</title>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#f5f5f5;
font-family:Arial;
}

.container{

width:400px;

margin:50px auto;

background:white;

padding:30px;

border-radius:15px;

box-shadow:0px 0px 10px gray;

text-align:center;

}

input{

width:90%;

padding:12px;

margin:10px;

font-size:16px;

border-radius:8px;

border:1px solid gray;

}

button{

padding:12px 25px;

background:#28a745;

color:white;

border:none;

font-size:18px;

border-radius:8px;

cursor:pointer;

}

button:hover{

background:#218838;

}

.result{

margin-top:20px;

font-size:22px;

font-weight:bold;

color:red;

}

</style>

</head>

<body>

<div class="container">

<h2>🌲 Forest Fire Prediction</h2>

<form action="/predict" method="POST">

<input
type="number"
step="any"
name="temperature"
placeholder="Temperature"
required>

<input
type="number"
step="any"
name="oxygen"
placeholder="Oxygen"
required>

<input
type="number"
step="any"
name="humidity"
placeholder="Humidity"
required>

<button type="submit">

Predict

</button>

</form>

<div class="result">

{{ prediction }}

</div>

</div>

</body>

</html>
